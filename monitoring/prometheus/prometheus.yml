global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: foresight-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8001"]

  - job_name: foresight-ingestion
    metrics_path: /metrics
    static_configs:
      - targets: ["ingestion:8000"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
