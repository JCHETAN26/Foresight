name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ingestion:
    name: Ingestion — lint, type, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingestion
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy app

      - name: Test (pytest)
        run: pytest -q

  terraform:
    name: Terraform — fmt & validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

  dbt:
    name: dbt + Great Expectations (DuckDB)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipelines/dbt/foresight
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt + quality gates
        run: |
          pip install "dbt-duckdb>=1.8,<2.0"
          pip install -e ../../quality[dev]

      - name: Seed (load bronze fixture)
        run: dbt seed --profiles-dir .

      - name: Build models + run all tests
        run: dbt build --profiles-dir .

      - name: Lint quality (ruff)
        run: ruff check ../../quality

      - name: Great Expectations — suite unit tests
        run: pytest ../../quality/tests -q

      - name: Great Expectations — gate bronze + gold
        run: python -m foresight_quality.run_quality --duckdb target/foresight.duckdb

  streaming:
    name: Streaming — bronze transform tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipelines/streaming
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q

  airflow:
    name: Airflow — DAG integrity
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipelines/orchestration
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Airflow (pinned + constraints)
        run: |
          pip install "apache-airflow==2.9.3" pytest \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.9.3/constraints-3.11.txt"
          pip install ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: DAG integrity tests
        run: pytest tests -q

  detection:
    name: ML detection — ensemble tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml/detection
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q

  classification:
    name: ML classification — data + baseline
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml/classification
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest — T5 gated off)
        run: pytest -q

  anomaly:
    name: ML anomaly — integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml/anomaly
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (detection + classification + anomaly)
        run: pip install -e ../detection -e ../classification -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q

  agent:
    name: Agent — LangGraph pipeline tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest — stub generator, no API key)
        run: pytest -q

  kpi-stream:
    name: KPI stream — cross-validate vs dbt gold
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/kpi_stream
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest — KPI math vs dbt gold)
        run: pytest -q

  worker:
    name: Worker — feature transform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/worker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install (light — no heavy pipeline deps)
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest — pure feature transform)
        run: pytest -q

  api:
    name: API — lint, type, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: foresight
          POSTGRES_PASSWORD: foresight
          POSTGRES_DB: foresight
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U foresight"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy app

      - name: Test (pytest)
        run: pytest -q
        env:
          DATABASE_URL: postgresql://foresight:foresight@localhost:5432/foresight
          REDIS_URL: redis://localhost:6379/0

  frontend:
    name: Frontend — build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Test (Vitest)
        run: npm test

      - name: Build (Next.js)
        run: npm run build

  docker:
    name: Docker — build ingestion image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ingestion image
        run: docker build -t foresight-ingestion:ci services/ingestion

      - name: Build API image
        run: docker build -t foresight-api:ci services/api

      - name: Build KPI-stream image
        run: docker build -t foresight-kpi-stream:ci services/kpi_stream
